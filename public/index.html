<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>永續漁人地圖 Sustainable Catch Map</title>
  
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    /* 藍綠色系與海灘風味調色盤 */
    :root {
      --ocean-blue: #0077b6;       /* 深海藍 */
      --seafoam-green: #48cae4;    /* 浪花青綠 */
      --beach-sand: #fefae0;       /* 沙灘白黃 */
      --text-dark: #023e8a;        /* 文字深藍 */
    }

    body { 
      font-family: '微軟正黑體', sans-serif; 
      margin: 0; 
      padding: 0; 
      background-color: var(--beach-sand); 
      color: var(--text-dark);
      text-align: center; 
    }

    header {
      background: linear-gradient(135deg, var(--ocean-blue), var(--seafoam-green));
      color: white;
      padding: 20px 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      border-bottom-left-radius: 15px;
      border-bottom-right-radius: 15px;
    }

    h1 { margin: 0; font-size: 22px; }
    header p { margin: 5px 0 0 0; font-size: 14px; opacity: 0.9; }

    .container {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      border-top: 4px solid var(--seafoam-green);
      text-align: left;
    }

    .card h3 { margin-top: 0; color: var(--ocean-blue); }

    /* 開源地圖容器 */
    #map {
      width: 100%;
      height: 250px;
      border-radius: 10px;
      background-color: #e0e0e0;
      z-index: 1; /* 避免遮擋其他選單 */
    }

    /* AR/3D 容器 */
    model-viewer {
      width: 100%;
      height: 250px;
      background-color: #e3f2fd;
      border-radius: 10px;
      outline: none;
    }

    .btn { 
      background: linear-gradient(90deg, var(--ocean-blue), var(--seafoam-green));
      color: white; 
      padding: 12px 20px; 
      border: none; 
      border-radius: 25px; 
      cursor: pointer; 
      font-size: 16px;
      font-weight: bold;
      width: 100%;
      margin-bottom: 10px;
      box-shadow: 0 4px 6px rgba(0,119,182,0.2);
    }
    .btn-secondary {
      background: #adb5bd;
      box-shadow: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>🌊 永續漁人地圖</h1>
    <p>Sustainable Catch Map</p>
  </header>

  <p id="status" style="margin-top: 30px;">正在載入海洋數據庫與地圖...</p>
  
  <div id="content" class="container" style="display: none;">
    
    <div class="card">
      <h3>📍 附近的友善海鮮地圖</h3>
      <p style="font-size: 13px; color: #666;">找尋周邊具有 MSC/ASC 認證或合作的餐廳與超市。</p>
      <div id="map"></div>
    </div>

    <div class="card">
      <h3>🐠 AR 互動與永續標籤</h3>
      <p style="font-size: 13px; color: #666;">可拖曳旋轉觀看。使用手機時點擊右下角，將魚類投影至現實環境中！</p>
      <model-viewer 
        src="https://modelviewer.dev/shared-assets/models/glTF-Sample-Assets/Models/BarramundiFish/glTF-Binary/BarramundiFish.glb" 
        alt="永續魚種 3D 模型" 
        ar 
        ar-modes="webxr scene-viewer quick-look"
        camera-controls 
        auto-rotate>
      </model-viewer>
    </div>

    <button class="btn" onclick="scanFishTag()">📷 掃描實體漁獲標籤</button>
    <button class="btn btn-secondary" onclick="liff.closeWindow()">❌ 關閉地圖</button>
  </div>

  <script>
    // 1. 初始化 Leaflet 開源地圖的函式
    function initMap() {
      // 預設中心點 (緯度, 經度)
      const centerLoc = [25.0330, 121.5654]; 
      
      // 建立地圖物件並綁定到 id 為 map 的 div
      const map = L.map('map').setView(centerLoc, 13);

      // 載入 OpenStreetMap 免費圖磚
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> 貢獻者',
        maxZoom: 19
      }).addTo(map);

      // 新增一個示範地標：永續海鮮合作餐廳
      L.marker(centerLoc).addTo(map)
        .bindPopup('<b>示範點：</b><br>永續海鮮示範餐廳')
        .openPopup();
        
      // 確保地圖在 div 顯示後重新計算大小，避免破圖
      setTimeout(() => {
        map.invalidateSize();
      }, 100);
    }

    // 2. LIFF 初始化與邏輯
    const liffId = "2009686844-OmL0fBtK"; // 您的 LIFF ID

    liff.init({ liffId: liffId })
      .then(() => {
        if (!liff.isLoggedIn()) {
          liff.login();
        } else {
          // 顯示主要內容
          document.getElementById('status').style.display = 'none';
          document.getElementById('content').style.display = 'flex';
          
          // 在內容顯示後才初始化地圖，確保 Leaflet 能正確抓到容器大小
          initMap();
        }
      })
      .catch((err) => {
        console.error("LIFF 初始化失敗", err);
        document.getElementById('status').innerText = "系統連線失敗，請稍後再試。\n" + err.message;
      });

    // 模擬掃描條碼功能 (呼叫 LIFF 的掃碼器)
    function scanFishTag() {
      if (liff.scanCodeV2) {
        liff.scanCodeV2().then(result => {
          alert("掃描成功！這批漁獲為「友善延繩釣」捕獲，符合永續指標。");
        }).catch(err => {
          alert("掃描功能目前僅支援手機端 LINE App 內開啟。");
        });
      } else {
        alert("此裝置不支援掃描功能。");
      }
    }
  </script>
</body>
</html>
