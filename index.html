<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FishFull 漁有料｜買對一條魚，也能讓海更有魚</title>
    <meta name="description" content="FishFull 漁有料是一個掃 QR Code 就能用的買魚小幫手，讓消費者看懂魚種、漁法、產地與料理方式，也讓魚販與店家更容易介紹友善漁獲。" />
    <link rel="stylesheet" href="home.css" />
  </head>
  <body>
    <div id="root"></div>

    <div class="mobile-social-dock" aria-label="社群連結">
      <a class="social-dock-btn social-instagram" href="https://www.instagram.com/fishfull_2025/" target="_blank" rel="noopener noreferrer" aria-label="Instagram" title="Instagram">
        <svg class="ig-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <rect x="3.5" y="3.5" width="17" height="17" rx="5.2"></rect>
          <circle cx="12" cy="12" r="4.1"></circle>
          <circle cx="17.25" cy="6.75" r="1.25" class="ig-dot"></circle>
        </svg>
      </a>
      <button class="social-dock-btn social-language language-toggle" type="button" aria-label="切換成英文" title="English">
        <span aria-hidden="true" data-lang-icon>EN</span>
      </button>
    </div>

    <div class="desktop-social-dock" aria-label="社群連結">
      <a class="social-dock-btn social-instagram" href="https://www.instagram.com/fishfull_2025/" target="_blank" rel="noopener noreferrer" aria-label="Instagram" title="Instagram">
        <svg class="ig-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <rect x="3.5" y="3.5" width="17" height="17" rx="5.2"></rect>
          <circle cx="12" cy="12" r="4.1"></circle>
          <circle cx="17.25" cy="6.75" r="1.25" class="ig-dot"></circle>
        </svg>
      </a>
      <button class="social-dock-btn social-language language-toggle" type="button" aria-label="切換成英文" title="English">
        <span aria-hidden="true" data-lang-icon>EN</span>
      </button>
    </div>

    <script src="site-i18n.js" defer></script>
    <script src="home.js" defer></script>
    <script src="fishfull-iteration.js" defer></script>
  </body>
</html>
