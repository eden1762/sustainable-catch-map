<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/pages/" />
    <title>FishFull 漁有料｜AR 遊戲</title>
    <meta name="description" content="FishFull 漁有料 AR 遊戲：手機先看到完整 3D 魚，再開相機把魚放進市場、餐桌或活動現場，接著看新鮮度、問法、料理與回饋。" />
    <link rel="preconnect" href="https://unpkg.com" crossorigin />
    <link rel="stylesheet" href="/pages/site-pages.css" />
    <link rel="stylesheet" href="/pages/action-pages.css" />
    <link rel="stylesheet" href="/pages/sustainability-ar.css" />
    <link rel="stylesheet" href="/pages/sustainability-real-fish-ar.css" />
    <link rel="stylesheet" href="/pages/sustainability-mobile-ar-safe.css" />
    <link rel="stylesheet" href="/pages/ar-page.css" />
    <link rel="stylesheet" href="/pages/ar-safe-view.css" />
    <link rel="stylesheet" href="/pages/ar-mobile-stall-controls.css" />
    <link rel="stylesheet" href="/pages/ar-mobile-fish-fit.css" />
    <link rel="stylesheet" href="/pages/ar-game-loop.css" />
    <link rel="stylesheet" href="/pages/ar-qr-stall.css" />
    <link rel="stylesheet" href="/pages/ar-fish-coach.css" />
    <link rel="stylesheet" href="/pages/ar-market-handoff.css" />
    <link rel="stylesheet" href="/pages/ar-market-thumb-flow.css" />
    <link rel="stylesheet" href="/fishfull-brand.css" />
    <style>
      .page-ar-game .brand-symbol {
        padding: 0;
        overflow: hidden;
        background: #fff;
        color: transparent;
      }

      .page-ar-game .brand-symbol img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: inherit;
      }

      .page-ar-game .ar-coach-picks button,
      .page-ar-game .ar-coach-mission-steps button,
      .page-ar-game .ar-coach-copy-ask,
      .page-ar-game .ar-coach-view-return,
      .page-ar-game .ar-coach-result > a {
        box-sizing: border-box;
        touch-action: manipulation;
      }

      .page-ar-game .ar-coach-picks button:focus-visible,
      .page-ar-game .ar-coach-mission-steps button:focus-visible,
      .page-ar-game .ar-coach-copy-ask:focus-visible,
      .page-ar-game .ar-coach-view-return:focus-visible,
      .page-ar-game .ar-coach-result > a:focus-visible {
        outline: 3px solid rgba(255,159,28,.7);
        outline-offset: 3px;
      }

      .page-ar-game .ar-coach-view-return {
        justify-self: start;
        max-width: 100%;
        min-height: 44px;
        padding: 11px 15px;
        border: 1px solid rgba(8,93,117,.18);
        border-radius: 999px;
        color: var(--ocean-deep);
        font: inherit;
        font-size: 14px;
        font-weight: 900;
        text-align: center;
        background: rgba(232,248,244,.86);
        box-shadow: 0 10px 24px rgba(7,54,77,.08);
        cursor: pointer;
        overflow-wrap: anywhere;
      }

      .page-ar-game .ar-coach-view-return:hover,
      .page-ar-game .ar-coach-view-return:focus-visible {
        border-color: rgba(8,93,117,.3);
        background: rgba(255,255,255,.94);
      }

      @media (max-width: 560px) {
        .page-ar-game .ar-fish-coach {
          padding-inline: max(16px, env(safe-area-inset-left)) max(16px, env(safe-area-inset-right)) !important;
          padding-bottom: calc(18px + env(safe-area-inset-bottom)) !important;
        }

        .page-ar-game .ar-coach-result > a,
        .page-ar-game .ar-coach-copy-ask,
        .page-ar-game .ar-coach-view-return {
          width: 100%;
          min-height: 48px;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          text-align: center;
          white-space: normal;
        }
      }
    </style>
  </head>
  <body data-page="ar-game" data-entry="ar-game">
    <div id="root"></div>
    <script src="/site-i18n.js" defer></script>
    <script src="/pages/ar-page.js" defer></script>
    <script src="/pages/ar-qr-stall.js" defer></script>
    <script src="/pages/ar-fish-coach.js" defer></script>
    <script src="/pages/ar-serving-helper.js" defer></script>
    <script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
    <script src="/pages/sustainability-real-fish-ar.js" defer></script>
    <script src="/pages/ar-safe-view.js" defer></script>
    <script src="/fishfull-site-shell.js" defer></script>
    <script>
      (function () {
        'use strict';

        var labels = {
          zh: '回看完整 3D 魚',
          en: 'Back to the full 3D fish'
        };
        var logoLabels = {
          zh: 'FishFull 漁有料官方商標',
          en: 'FishFull official logo'
        };
        var timer = null;

        function currentLang() {
          return window.SCMLanguage ? window.SCMLanguage.current() : 'zh';
        }

        function label() {
          return labels[currentLang()] || labels.zh;
        }

        function logoLabel() {
          return logoLabels[currentLang()] || logoLabels.zh;
        }

        function enforceOfficialLogo() {
          Array.prototype.slice.call(document.querySelectorAll('.page-ar-game .brand .brand-symbol')).forEach(function (symbol) {
            var text = logoLabel();
            var img = symbol.querySelector('img[src="/fishfull.jpg"]');
            if (!img) {
              symbol.removeAttribute('aria-hidden');
              symbol.innerHTML = '<img src="/fishfull.jpg" width="42" height="42" loading="eager" decoding="async" alt="">';
              img = symbol.querySelector('img');
            }
            if (img && img.getAttribute('alt') !== text) img.setAttribute('alt', text);
          });
        }

        function focusFishStage() {
          var stage = document.getElementById('fishfull-ar-stage');
          if (!stage) return;
          stage.scrollIntoView({ block: 'start', behavior: 'smooth' });
          stage.setAttribute('tabindex', '-1');
          window.setTimeout(function () { stage.focus({ preventScroll: true }); }, 260);
        }

        function applyButtonText(button) {
          var text = label();
          if (button.textContent !== text) button.textContent = text;
          if (button.getAttribute('aria-label') !== text) button.setAttribute('aria-label', text);
        }

        function enhanceCoach() {
          enforceOfficialLogo();
          Array.prototype.slice.call(document.querySelectorAll('.ar-coach-result')).forEach(function (card) {
            var existing = card.querySelector('.ar-coach-view-return');
            if (existing) {
              applyButtonText(existing);
              return;
            }
            var button = document.createElement('button');
            button.type = 'button';
            button.className = 'ar-coach-view-return';
            applyButtonText(button);
            button.addEventListener('click', focusFishStage);
            var mainAction = card.querySelector('a[href]');
            if (mainAction) card.insertBefore(button, mainAction);
            else card.appendChild(button);
          });
        }

        function scheduleEnhance() {
          window.clearTimeout(timer);
          timer = window.setTimeout(enhanceCoach, 80);
        }

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', scheduleEnhance);
        else scheduleEnhance();
        document.addEventListener('scm-language-change', scheduleEnhance);
        new MutationObserver(scheduleEnhance).observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
