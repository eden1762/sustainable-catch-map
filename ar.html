  <head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="/pages/ar-market-thumb-flow.css" />

    <link rel="stylesheet" href="/pages/ar-market-camera-safe.css" />
    <link rel="stylesheet" href="/pages/ar-stall-tap-safe.css" />
    <link rel="stylesheet" href="/pages/ar-stall-quick-nav.css" />
    <link rel="stylesheet" href="/pages/ar-official-model-only.css" />

    <style>
      .page-ar-game .brand-symbol {
        padding: 0;
        overflow: hidden;
        background: #fff;
        color: transparent;
      }

      .page-ar-game .brand-symbol img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: inherit;
      }

      .page-ar-game .ar-coach-picks button,
      .page-ar-game .ar-coach-mission-steps button,
      .page-ar-game .ar-coach-copy-ask,
      .page-ar-game .ar-coach-view-return,
      .page-ar-game .ar-coach-result > a {
        box-sizing: border-box;
        touch-action: manipulation;
      }

      .page-ar-game .ar-coach-picks button:focus-visible,
      .page-ar-game .ar-coach-mission-steps button:focus-visible,
      .page-ar-game .ar-coach-copy-ask:focus-visible,
      .page-ar-game .ar-coach-view-return:focus-visible,
      .page-ar-game .ar-coach-result > a:focus-visible {
        outline: 3px solid rgba(255,159,28,.7);
        outline-offset: 3px;
      }

      .page-ar-game .ar-coach-view-return {
        justify-self: start;
        max-width: 100%;
        min-height: 44px;
        padding: 11px 15px;
        border: 1px solid rgba(8,93,117,.18);
        border-radius: 999px;
        color: var(--ocean-deep);
        font: inherit;
        font-size: 14px;
        font-weight: 900;
        text-align: center;
        background: rgba(232,248,244,.86);
        box-shadow: 0 10px 24px rgba(7,54,77,.08);
        cursor: pointer;
        overflow-wrap: anywhere;
      }

      .page-ar-game .ar-coach-view-return:hover,
      .page-ar-game .ar-coach-view-return:focus-visible {
        border-color: rgba(8,93,117,.3);
        background: rgba(255,255,255,.94);
      }

      @media (max-width: 560px) {
        .page-ar-game .ar-fish-coach {
          padding-inline: max(16px, env(safe-area-inset-left)) max(16px, env(safe-area-inset-right)) !important;
          padding-bottom: calc(18px + env(safe-area-inset-bottom)) !important;
        }

        .page-ar-game .ar-coach-result > a,
        .page-ar-game .ar-coach-copy-ask,
        .page-ar-game .ar-coach-view-return {
          width: 100%;
          min-height: 48px;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          text-align: center;
          white-space: normal;
        }
      }
    </style>
  </head>
  <body data-page="ar-game" data-entry="ar-game">
    <div id="root"></div>
    <script src="/site-i18n.js" defer></script>
    <script src="/pages/ar-page.js" defer></script>
    <script src="/pages/ar-qr-stall.js" defer></script>
    <script src="/pages/ar-fish-coach.js" defer></script>
    <script src="/pages/ar-market-30sec.js" defer></script>
    <script src="/pages/ar-serving-helper.js" defer></script>
    <script src="/pages/ar-buy-light-cues.js" defer></script>
    <script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
    <script src="/pages/sustainability-real-fish-ar.js" defer></script>
    <script src="/pages/ar-official-model-only.js" defer></script>
    <script src="/pages/ar-visual-viewport-sync.js" defer></script>
    <script src="/pages/ar-mobile-full-fish-guard.js" defer></script>
    <script src="/pages/ar-safe-view.js" defer></script>
    <script src="/fishfull-site-shell.js" defer></script>
    <script>
      (function () {
        'use strict';
        var labels = {
          zh: '回看完整 3D 魚',
          en: 'Back to the full 3D fish'
        };
        var logoLabels = {
          zh: 'FishFull 漁有料官方商標',
          en: 'FishFull official logo'
        };
        var timer = null;
        var qrEntryFocused = false;
        var reduceMotionQuery = window.matchMedia ? window.matchMedia('(prefers-reduced-motion: reduce)') : null;

        function currentLang() {
          return window.SCMLanguage ? window.SCMLanguage.current() : 'zh';
        }

        function label() {
          return labels[currentLang()] || labels.zh;
        }

        function logoLabel() {
          return logoLabels[currentLang()] || logoLabels.zh;
        }

        function enforceOfficialLogo() {
          Array.prototype.slice.call(document.querySelectorAll('.page-ar-game .brand .brand-symbol')).forEach(function (symbol) {
            var text = logoLabel();
            var img = symbol.querySelector('img[src="/fishfull.jpg"]');
            if (!img) {
              symbol.removeAttribute('aria-hidden');
              symbol.innerHTML = '<img src="/fishfull.jpg" width="42" height="42" loading="eager" decoding="async" alt="">';
              img = symbol.querySelector('img');
            }
            if (img && img.getAttribute('alt') !== text) img.setAttribute('alt', text);
          });
        }

        function syncMotionPreference() {
          var shouldReduce = !!(reduceMotionQuery && reduceMotionQuery.matches);
          Array.prototype.slice.call(document.querySelectorAll('.page-ar-game model-viewer.ar-model')).forEach(function (model) {
            if (shouldReduce) {
              if (!model.dataset.originalRotation) model.dataset.originalRotation = model.getAttribute('rotation-per-second') || '16deg';
              model.removeAttribute('auto-rotate');
              model.setAttribute('interaction-prompt', 'none');
            } else {
              model.setAttribute('auto-rotate', '');
              model.setAttribute('rotation-per-second', model.dataset.originalRotation || model.getAttribute('rotation-per-second') || '16deg');
            }
          });
        }

        function prefersReducedMotion() {
          return !!(reduceMotionQuery && reduceMotionQuery.matches);
        }

        function focusFishStage() {
          var stage = document.getElementById('fishfull-ar-stage');
          if (!stage) return;
          if (qrEntryFocused) return;
          qrEntryFocused = true;
          document.body.classList.add('ar-fish-first-entry');
          stage.scrollIntoView({ behavior: prefersReducedMotion() ? 'auto' : 'smooth', block: 'start' });
          window.setTimeout(function () {
            var model = stage.querySelector('model-viewer.ar-model');
            if (model && model.focus) model.focus({ preventScroll: true });
          }, 550);
        }

        function ensureReturnButton() {
          var coach = document.querySelector('.page-ar-game .ar-fish-coach');
          if (!coach || coach.querySelector('[data-ar-view-return]')) return;
          var button = document.createElement('button');
          button.type = 'button';
          button.className = 'ar-coach-view-return';
          button.setAttribute('data-ar-view-return', '');
          button.textContent = label();
          button.addEventListener('click', function () {
            var stage = document.getElementById('fishfull-ar-stage');
            if (stage) stage.scrollIntoView({ behavior: prefersReducedMotion() ? 'auto' : 'smooth', block: 'start' });
          });
          coach.insertBefore(button, coach.firstChild);
        }

        function syncReturnButtonLabel() {
          Array.prototype.slice.call(document.querySelectorAll('[data-ar-view-return]')).forEach(function (button) {
            button.textContent = label();
          });
        }

        function enhance() {
          window.clearTimeout(timer);
          timer = window.setTimeout(function () {
            enforceOfficialLogo();
            syncMotionPreference();
            ensureReturnButton();
            syncReturnButtonLabel();
            if (window.location.hash === '#fishfull-ar-stage') focusFishStage();
          }, 120);
        }

        document.addEventListener('DOMContentLoaded', enhance);
        document.addEventListener('scm-language-change', enhance);
        window.addEventListener('load', enhance);
        window.addEventListener('hashchange', enhance);
        if (reduceMotionQuery && reduceMotionQuery.addEventListener) reduceMotionQuery.addEventListener('change', enhance);
        else if (reduceMotionQuery && reduceMotionQuery.addListener) reduceMotionQuery.addListener(enhance);
      })();
    </script>
  </body>
</html>
